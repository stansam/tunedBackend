<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .footer { border-top: 1px solid #eee; padding-top: 10px; margin-top: 20px; font-size: 0.8em; color: #777; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>{{ subject }}</h2>
        </div>
        <div class="content">
            {{ body|safe }}
        </div>
        <div class="footer">
            <p>&copy; {{ current_year }} Tuned Essays. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
